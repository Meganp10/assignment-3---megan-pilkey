<style>
  
  html{
      font-size: 20px;

    body{
       background-color: #FFFFFE;

   .container {
      width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 40% 60%;
     gap: 20px;
     margin-top: 200px;
    }
  
  img{
    width: 100%;
    height: auto;
    display: block;
  }
  
  </style>

  <body>
    
 
  <div class="container">
    
    <!-- Left: Text -->
    <div class="text">
      <h2>My Heading</h2>
      <p>
        This is some text on the left side of the grid. It will sit beside the image on larger screens and stack on smaller screens.
      </p>
    </div>

    <!-- Right: Image -->
    <div class="image">
      <img src="https://via.placeholder.com/600x400" alt="Example image">
    </div>

  </div>

</body>
