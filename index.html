<!DOCTYPE html>
<html lang="en-ca">
<head>
<title>Assignment 3</title>
<meta charset="utf-8">

<style>
  
  html{
      font-size: 20px;
    }
  
    body{
       background-color: #FFFFFE;
    }
  
   .container {
      width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 40% 60%;
      gap: 20px;
      margin-top: 200px;
     background-color:#E77F74;
     padding: 20px;
    }
  
  .storeimg{
    padding: 20px;
  }
  
  img{
    width: 100%;
    height: auto;
    display: block;
    aspect-ratio: 3/2;
  }
  
  h1, h2, p{
    color: #FFFFFE;
  }
  
  .hours {
  display: grid;
  grid-template-columns: 30% 70%;
  row-gap: 5px;
  column-gap: 10px;
  color: white;
}
  
  
  </style>
  </head>
  
  <body>
    
 
  <div class="container">
    
    <!-- Left: Text -->
    <div class="text">
      <h1>Come Visit Us!</h1>
      <h2>Location</h2>
      <p>
        2-90 Peel St
      </p>
      <p>
        New Hamburg ON N3A 1E3
        Canada
      </p>
       <h2>Hours</h2>
     
    <div class="hours">
  <div class="day">Sunday</div>
  <div class="time">10:00AM - 4:00PM</div>

  <div class="day">Monday</div>
  <div class="time">8:00AM - 6:00PM</div>

  <div class="day">Tue-Fri</div>
  <div class="time">8:00AM - 8:00PM</div>

  <div class="day">Saturday</div>
  <div class="time">9:00AM - 6:00PM</div>
</div> 
    </div>

    <!-- store image -->
    <div class="storeimg">
      <img src="Store.png" alt="Outside view of the Garden Stand">
    </div>

  </div>

</body>
</html>
